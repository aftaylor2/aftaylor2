name: Metrics

on:
  # Schedule daily updates
  schedule: [{cron: "2 0 * * *"}]
  # (optional) Run workflow manually
  workflow_dispatch:
  # (optional) Run workflow when pushing on master/main
  push: {branches: ["master"]}

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: left profile 
        uses: stalomeow/metrics@projects-v2
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: github-metrics-left.svg

          # Options
          user: aftaylor2
          template: classic
          base: header, activity, community
          config_timezone: America/New_York
          plugin_languages: yes
          plugin_languages_colors: github
          plugin_languages_limit: 8
          plugin_languages_sections: most-used
          plugin_languages_ignored: html, css
          plugin_languages_details: percentage #, lines
          plugin_languages_indepth: yes
          plugin_languages_analysis_timeout: 30
          # plugin_anilist: yes
          # plugin_anilist_user: Stalo
          # plugin_anilist_sections: characters
          # plugin_anilist_limit_characters: 22
          config_padding: 0, 8 + 11%
          config_order: base.header, base.activity+community, languages
          commits_authoring: aftaylor2, aftaylor2@gmail.com, aftaylor2@users.noreply.github.com
          repositories_affiliations: owner, collaborator
